name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "7 1 2 3 4 5 6 7"
          expected-output: |-
            LEVEL 0: 1
            LEVEL 1: 2 3
            LEVEL 2: 4 5 6 7
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - satu node
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - satu node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "1 9"
          expected-output: |-
            LEVEL 0: 9
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - dua node
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - dua node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "2 10 20"
          expected-output: |-
            LEVEL 0: 10
            LEVEL 1: 20
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - tiga node
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - tiga node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 5 6 7"
          expected-output: |-
            LEVEL 0: 5
            LEVEL 1: 6 7
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - empat node
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - empat node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 1 2 3 4"
          expected-output: |-
            LEVEL 0: 1
            LEVEL 1: 2 3
            LEVEL 2: 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - lima node
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - lima node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "5 10 20 30 40 50"
          expected-output: |-
            LEVEL 0: 10
            LEVEL 1: 20 30
            LEVEL 2: 40 50
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - enam node
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - enam node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "6 3 6 9 12 15 18"
          expected-output: |-
            LEVEL 0: 3
            LEVEL 1: 6 9
            LEVEL 2: 12 15 18
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - delapan node
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - delapan node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "8 1 2 3 4 5 6 7 8"
          expected-output: |-
            LEVEL 0: 1
            LEVEL 1: 2 3
            LEVEL 2: 4 5 6 7
            LEVEL 3: 8
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - nilai negatif dan nol
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - nilai negatif dan nol
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "7 0 -1 -2 -3 -4 -5 -6"
          expected-output: |-
            LEVEL 0: 0
            LEVEL 1: -1 -2
            LEVEL 2: -3 -4 -5 -6
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - sembilan node
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - sembilan node
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "9 11 22 33 44 55 66 77 88 99"
          expected-output: |-
            LEVEL 0: 11
            LEVEL 1: 22 33
            LEVEL 2: 44 55 66 77
            LEVEL 3: 88 99
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
